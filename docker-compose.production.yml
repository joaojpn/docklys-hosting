services:
  postgres:
    image: postgres:16-alpine
    container_name: docklys-postgres
    restart: always
    environment:
      POSTGRES_USER: docklys
      POSTGRES_PASSWORD: ${DB_PASSWORD:-docklys}
      POSTGRES_DB: docklys
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - docklys

  minio:
    image: minio/minio:latest
    container_name: docklys-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-docklys}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-docklys123}
    volumes:
      - minio_data:/data
    networks:
      - docklys

volumes:
  postgres_data:
  minio_data:

networks:
  docklys:
    driver: bridge
